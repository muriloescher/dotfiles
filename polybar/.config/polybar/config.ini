[colors]
bg = #11111b
bg-alt = #181825
bg-chip = #252738
bg-dark = #0b0b12

fg = #e6e9ef
fg-dim = #a6adc8

blue = #89b4fa
teal = #94e2d5
green = #a6e3a1
yellow = #f9e2af
peach = #fab387
red = #f38ba8
mauve = #cba6f7


[bar/main]
monitor = ${env:MONITOR:}

width = 98%
offset-x = 1%
offset-y = 8

height = 42
radius = 12

border-size = 2
border-color = ${colors.bg-dark}

background = ${colors.bg}
foreground = ${colors.fg}

padding-left = 2
padding-right = 2
module-margin = 1

fixed-center = true

line-size = 0

font-0 = "JetBrainsMono Nerd Font:style=Regular:size=18;4"
font-1 = "JetBrainsMono Nerd Font:style=Bold:size=18;4"

modules-left = i3
modules-center = date
modules-right = media volume battery

wm-restack = i3
override-redirect = false
enable-ipc = true

separator =
separator-foreground = ${colors.bg-chip}


[module/i3]
type = internal/i3

pin-workspaces = false
index-sort = true
enable-click = true
enable-scroll = true
wrapping-scroll = false

strip-wsnumbers = false

label-focused = %name%
label-focused-background = ${colors.mauve}
label-focused-foreground = ${colors.bg}
label-focused-padding = 1

label-unfocused = %name%
label-unfocused-background = ${colors.bg-alt}
label-unfocused-foreground = ${colors.fg-dim}
label-unfocused-padding = 1

label-visible = %name%
label-visible-background = ${colors.bg-chip}
label-visible-foreground = ${colors.fg}
label-visible-padding = 1

label-urgent = %name%
label-urgent-background = ${colors.red}
label-urgent-foreground = ${colors.bg}
label-urgent-padding = 1



[module/date]
type = internal/date

interval = 1

date = %d.%m.%Y
time = %H:%M

format = <label>
format-background = ${colors.bg-chip}
format-foreground = ${colors.fg}
format-padding = 2

label =  %date%    %time%



[module/cpu]
type = internal/cpu

interval = 2

format = <label>
format-background = ${colors.bg-chip}
format-foreground = ${colors.fg}
format-padding = 2

label = %percentage:2%%



[module/memory]
type = internal/memory

interval = 2

format = <label>
format-background = ${colors.bg-chip}
format-foreground = ${colors.fg}
format-padding = 2

label =  %percentage_used%%



[module/battery]
type = internal/battery

battery = BAT0
adapter = AC

poll-interval = 5

format-charging = <label-charging>
format-charging-background = ${colors.bg-chip}
format-charging-foreground = ${colors.fg}
format-charging-padding = 2

format-discharging = <label-discharging>
format-discharging-background = ${colors.bg-chip}
format-discharging-foreground = ${colors.fg}
format-discharging-padding = 2

format-full = <label-full>
format-full-background = ${colors.bg-chip}
format-full-foreground = ${colors.fg}
format-full-padding = 2

label-charging =  %percentage%%
label-discharging =  %percentage%%
label-full =  100%



[module/volume]
type = internal/pulseaudio

format-volume = <label-volume>
format-volume-background = ${colors.bg-chip}
format-volume-foreground = ${colors.fg}
format-volume-padding = 2

format-muted = <label-muted>
format-muted-background = ${colors.bg-chip}
format-muted-padding = 2

label-volume =   %percentage%%

label-muted =  muted
label-muted-foreground = ${colors.fg-dim}

scroll-up = pactl set-sink-volume @DEFAULT_SINK@ +5%
scroll-down = pactl set-sink-volume @DEFAULT_SINK@ -5%
click-right = pactl set-sink-mute @DEFAULT_SINK@ toggle



[module/nerd-dictation]
type = custom/script

exec = ~/.config/polybar/scripts/nerd-dictation-status.sh
interval = 1

format = <label>
format-background = ${colors.bg-chip}
format-foreground = ${colors.fg}
format-padding = 2

label = %output%



[module/powermenu]
type = custom/menu

label-open = 
label-close = 

menu-0-0 = Shutdown
menu-0-0-exec = poweroff

menu-0-1 = Reboot
menu-0-1-exec = reboot



[module/media]
type = custom/script
exec = ~/.config/polybar/scripts/media-status.sh
tail = true

format = <label>
format-background = ${colors.bg-chip}
format-foreground = ${colors.fg}
format-padding = 2

label = %output%
