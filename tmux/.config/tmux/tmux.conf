# use Ctrl+a instead of Ctrl+b
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# enable mouse (pane resize, scrolling)
set -g mouse on

# increase scrollback
set -g history-limit 100000

# easier splits
bind | split-window -h
bind - split-window -v

# vim-style pane movement
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# reload config quickly
bind r source-file ~/.config/tmux/tmux.conf

# terminal / truecolor
set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-256color:RGB"

# pane borders
set -g pane-border-lines single
set -g pane-border-style "fg=#313244"
set -g pane-active-border-style "fg=#89b4fa"

# status bar base
set -g status on
set -g status-position bottom
set -g status-style "fg=#bac2de,bg=#11111b"
set -g status-justify left
set -g status-left-length 20
set -g status-right-length 80

# make window list sit cleanly on the same background
set -g window-status-separator ""
set -g window-status-style "fg=#6c7086,bg=#11111b"
set -g window-status-current-style "fg=#11111b,bg=#89b4fa,bold"

# simplify displayed windows
set -g window-status-format " #I "
set -g window-status-current-format " #I "

# left/right sections
set -g status-left "#[fg=#11111b,bg=#cba6f7,bold] #S "
set -g status-right "#[fg=#6c7086,bg=#11111b]#{pane_current_path} #[fg=#89b4fa,bg=#11111b]%H:%M "

# messages
set -g message-style "fg=#e6e9ef,bg=#1e1e2e"
set -g message-command-style "fg=#11111b,bg=#a6e3a1"
